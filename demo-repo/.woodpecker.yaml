# NB: tag must be listed HERE too — the pipeline-level filter runs before the
# per-step `when: event: [manual, tag]` gates, so without it tag pushes never
# create a pipeline at all.
when:
  - event: [push, pull_request, tag, manual]

# Override default clone to use internal Docker network hostname
clone:
  - name: clone
    image: woodpeckerci/plugin-git
    settings:
      remote: http://gitea:3000/${CI_REPO}
      ref: ${CI_COMMIT_REF}
      sha: ${CI_COMMIT_SHA}

steps:
  - name: lint
    image: ghcr.io/astral-sh/uv:python3.12-alpine
    commands:
      - uv tool run ruff check .

  - name: test
    image: ghcr.io/astral-sh/uv:python3.12-alpine
    commands:
      - uv sync
      - uv run python -c "from main import app; print('Import OK')"

  - name: build
    image: docker:cli
    # Only build on manual trigger or tags (optional step)
    when:
      - event: [manual, tag]
    environment:
      # Registry URL from secret (Harbor) or default to Gitea's built-in registry
      # - Gitea: 127.0.0.1 (routed via Traefik to Gitea /v2/*)
      # - Harbor: registry.localhost (routed via Traefik to Harbor)
      REGISTRY_URL:
        from_secret: registry_url
    commands:
      # Use registry URL from secret, default to Gitea (127.0.0.1).
      # No dollar-brace expressions here — not even in COMMENTS: Woodpecker's
      # substitution engine parses them anywhere in the file, secrets are not
      # in its substitution set, and it rejects escaped/default forms. Bare
      # $VAR passes through to the shell untouched.
      - REGISTRY=$REGISTRY_URL; [ -n "$REGISTRY" ] || REGISTRY=127.0.0.1; export REGISTRY
      - 'echo "Building for registry: $REGISTRY"'
      - docker build -t $REGISTRY/admin/demo-app:${CI_COMMIT_SHA:0:8} .
      - docker tag $REGISTRY/admin/demo-app:${CI_COMMIT_SHA:0:8} $REGISTRY/admin/demo-app:latest
      - docker images $REGISTRY/admin/demo-app
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  - name: push
    image: docker:cli
    when:
      - event: [manual, tag]
    environment:
      # Registry credentials — same pair works for both backends:
      # - Harbor: robot/admin account (registry_url = 127.0.0.1:8082)
      # - Gitea:  gitea user + token/password (registry_url = 127.0.0.1)
      # NB: every from_secret here MUST exist in Woodpecker (v3 hard-errors on
      # missing secrets — no implicit optional fallbacks).
      REGISTRY_URL:
        from_secret: registry_url
      REGISTRY_USERNAME:
        from_secret: registry_username
      REGISTRY_PASSWORD:
        from_secret: registry_password
    commands:
      # No dollar-brace expressions (even in comments) — see the build step.
      - REGISTRY=$REGISTRY_URL; [ -n "$REGISTRY" ] || REGISTRY=127.0.0.1; export REGISTRY
      - 'echo "Pushing to registry: $REGISTRY"'
      - |
        if [ -n "$REGISTRY_USERNAME" ] && [ -n "$REGISTRY_PASSWORD" ]; then
          echo "$REGISTRY_PASSWORD" | docker login $REGISTRY --username "$REGISTRY_USERNAME" --password-stdin
        else
          echo "Warning: No registry credentials configured"
        fi
      - docker push $REGISTRY/admin/demo-app:${CI_COMMIT_SHA:0:8}
      - docker push $REGISTRY/admin/demo-app:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
