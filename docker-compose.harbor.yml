# Docker Compose file for Harbor container registry (optional)
# Include with: docker compose -f docker-compose.yml -f docker-compose.harbor.yml up -d
# Or set REGISTRY_BACKEND=harbor in .env and use: just harbor-up

services:
  harbor-core:
    image: goharbor/harbor-core:v2.14.4
    container_name: siai-harbor-core
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      harbor-redis:
        condition: service_started
    environment:
      - CONFIG_PATH=/etc/harbor/app.conf
      - EXT_ENDPOINT=http://registry.localhost
      - DATABASE_TYPE=postgresql
      - POSTGRESQL_HOST=postgres
      - POSTGRESQL_PORT=5432
      - POSTGRESQL_DATABASE=harbor
      - POSTGRESQL_USERNAME=${POSTGRES_USER:-postgres}
      - POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRESQL_SSLMODE=disable
      - REGISTRY_URL=http://harbor-registry:5000
      - PORTAL_URL=http://harbor-portal:8080
      - TOKEN_SERVICE_URL=http://harbor-core:8080/service/token
      - HARBOR_ADMIN_PASSWORD=${HARBOR_ADMIN_PASSWORD:-Harbor12345}
      - CORE_SECRET=${HARBOR_CORE_SECRET:-harbor-core-secret-key-change-me}
      - JOBSERVICE_SECRET=${HARBOR_JOBSERVICE_SECRET:-harbor-jobservice-secret}
      - _REDIS_URL_CORE=redis://harbor-redis:6379/0
      # Core → registry basic auth (must match the registry's htpasswd,
      # generated by `just harbor-up` from HARBOR_REGISTRY_SECRET)
      - REGISTRY_CREDENTIAL_USERNAME=harbor_registry_user
      - REGISTRY_CREDENTIAL_PASSWORD=${HARBOR_REGISTRY_SECRET:-harbor-registry-secret}
      - REGISTRY_STORAGE_PROVIDER_NAME=filesystem
      - LOG_LEVEL=info
      - CORE_LOCAL_URL=http://127.0.0.1:8080
      - CORE_URL=http://harbor-core:8080
      - JOBSERVICE_URL=http://harbor-jobservice:8080
      - TRIVY_ADAPTER_URL=http://harbor-trivy:8080
      - WITH_TRIVY=${HARBOR_TRIVY_ENABLED:-false}
    volumes:
      - harbor-core-data:/data
      - ./config/harbor/app.conf:/etc/harbor/app.conf:ro
      # Token-signing key for registry auth. Generated by `just harbor-up` on
      # first run (gitignored); registry mounts the matching root.crt.
      - ./config/harbor/private_key.pem:/etc/core/private_key.pem:ro
    labels:
      - "traefik.enable=true"
      # Core fronts the registry protocol (/v2, proxied to harbor-registry
      # internally) AND the Harbor API/token service — same shape as the
      # official installer's nginx. These labels must live on THIS container:
      # Traefik resolves a router's service to the container carrying the label.
      - "traefik.http.routers.harbor-api.rule=Host(`registry.localhost`) && (PathPrefix(`/api`) || PathPrefix(`/service`) || PathPrefix(`/v2`) || PathPrefix(`/c`) || PathPrefix(`/chartrepo`))"
      - "traefik.http.routers.harbor-api.entrypoints=web"
      - "traefik.http.routers.harbor-api.service=harbor-core-api"
      - "traefik.http.services.harbor-core-api.loadbalancer.server.port=8080"
    ports:
      # docker push endpoint: 127.0.0.1:8082/<project>/<image>. Docker only
      # auto-allows plain http for 127.0.0.1 — pushes to registry.localhost
      # would be attempted over TLS (same reason the Gitea registry path uses
      # 127.0.0.1, see AGENTS.md). The UI/API stay on registry.localhost.
      - "127.0.0.1:8082:8080"
    networks:
      - devnet

  harbor-portal:
    image: goharbor/harbor-portal:v2.14.4
    container_name: siai-harbor-portal
    restart: unless-stopped
    depends_on:
      - harbor-core
    environment:
      - CORE_URL=http://harbor-core:8080
    volumes:
      # Stock image nginx writes /var/run/nginx.pid, unwritable for uid 10000
      # → crash loop. This config keeps writable paths under /tmp.
      - ./config/harbor/portal-nginx.conf:/etc/nginx/nginx.conf:ro
    labels:
      - "traefik.enable=true"
      # Harbor Web UI - route registry.localhost to portal
      - "traefik.http.routers.harbor-portal.rule=Host(`registry.localhost`) && !PathPrefix(`/v2`) && !PathPrefix(`/api`) && !PathPrefix(`/service`)"
      - "traefik.http.routers.harbor-portal.entrypoints=web"
      - "traefik.http.routers.harbor-portal.service=harbor-portal"
      - "traefik.http.services.harbor-portal.loadbalancer.server.port=8080"
    networks:
      - devnet

  harbor-registry:
    image: goharbor/registry-photon:v2.14.4
    container_name: siai-harbor-registry
    restart: unless-stopped
    depends_on:
      - harbor-core
    environment:
      - REGISTRY_HTTP_SECRET=${HARBOR_REGISTRY_SECRET:-harbor-registry-secret}
    volumes:
      - harbor-registry-data:/storage
      - ./config/harbor/registry-config.yml:/etc/registry/config.yml:ro
      # htpasswd for core → registry basic auth (see registry-config.yml).
      # Generated by `just harbor-up` (gitignored).
      - ./config/harbor/registry-passwd:/etc/registry/passwd:ro
    networks:
      - devnet

  harbor-jobservice:
    image: goharbor/harbor-jobservice:v2.14.4
    container_name: siai-harbor-jobservice
    restart: unless-stopped
    depends_on:
      - harbor-core
    environment:
      - CORE_SECRET=${HARBOR_CORE_SECRET:-harbor-core-secret-key-change-me}
      - JOBSERVICE_SECRET=${HARBOR_JOBSERVICE_SECRET:-harbor-jobservice-secret}
      - CORE_URL=http://harbor-core:8080
      - REGISTRY_URL=http://harbor-registry:5000
      - REGISTRY_CREDENTIAL_USERNAME=harbor_registry_user
      - REGISTRY_CREDENTIAL_PASSWORD=${HARBOR_REGISTRY_SECRET:-harbor-registry-secret}
      - _REDIS_URL_CORE=redis://harbor-redis:6379/0
      - _REDIS_URL_REG=redis://harbor-redis:6379/1
      - LOG_LEVEL=info
    volumes:
      - harbor-jobservice-data:/var/log/jobs
      - ./config/harbor/jobservice-config.yml:/etc/jobservice/config.yml:ro
    networks:
      - devnet

  harbor-redis:
    image: redis:7-alpine
    container_name: siai-harbor-redis
    restart: unless-stopped
    volumes:
      - harbor-redis-data:/data
    networks:
      - devnet

  # Optional: Trivy vulnerability scanner
  # Enabled when HARBOR_TRIVY_ENABLED=true
  harbor-trivy:
    image: goharbor/trivy-adapter-photon:v2.14.4
    container_name: siai-harbor-trivy
    restart: unless-stopped
    profiles:
      - trivy
    environment:
      - SCANNER_LOG_LEVEL=info
      - SCANNER_TRIVY_CACHE_DIR=/home/scanner/.cache/trivy
      - SCANNER_TRIVY_REPORTS_DIR=/home/scanner/.cache/reports
      - SCANNER_TRIVY_DEBUG_MODE=false
      - SCANNER_TRIVY_VULN_TYPE=os,library
      - SCANNER_TRIVY_GITHUB_TOKEN=${TRIVY_GITHUB_TOKEN:-}
      - SCANNER_REDIS_URL=redis://harbor-redis:6379/5
    volumes:
      - harbor-trivy-data:/home/scanner/.cache
    networks:
      - devnet

volumes:
  harbor-core-data:
  harbor-registry-data:
  harbor-jobservice-data:
  harbor-redis-data:
  harbor-trivy-data:
