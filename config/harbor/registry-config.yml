# Harbor Registry configuration
# This file is mounted into harbor-registry container

version: 0.1
log:
  level: info
  fields:
    service: registry
storage:
  cache:
    blobdescriptor: redis
  filesystem:
    rootdirectory: /storage
  delete:
    enabled: true
  redirect:
    disable: true
redis:
  addr: harbor-redis:6379
  db: 2
http:
  addr: :5000
  relativeurls: false
  debug:
    addr: :5001
    prometheus:
      enabled: true
      path: /metrics
# Harbor v2.x shape: core fronts ALL registry traffic (validating client
# bearer tokens itself) and authenticates to the registry with basic auth —
# REGISTRY_CREDENTIAL_USERNAME/PASSWORD on core must match this htpasswd
# (generated by `just harbor-up` from HARBOR_REGISTRY_SECRET).
auth:
  htpasswd:
    realm: harbor-registry-basic-realm
    path: /etc/registry/passwd
validation:
  disabled: true
compatibility:
  schema1:
    enabled: true
